<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ações Práticas | O que você pode fazer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js" defer></script>
</head>

<body>

    <header>

        <nav class="menu-navegacao">
            <a href="index.html">♻️ Início</a>
            <a href="sobre.html">📖 Sobre</a>
            <a href="acoes.html" class="ativo">🌱 Ações</a>
        </nav>

        <div class="emoji" role="img" aria-label="Sustentabilidade">
            
        </div>

        <h1>Ações Sustentáveis</h1>

        <p>
            O que VOCÊ pode fazer para contribuir com uma indústria mais sustentável.
        </p>

    </header>

    <main>

        <section>

            <h2>Ações que fazem a diferença</h2>

            <div class="lista-acoes" id="container-acoes">
            </div>

        </section>

        <section class="secao-cinza">

            <div class="container-central">

                <h2>Quero fazer parte!</h2>

                <form class="formulario" id="formulario-adesao" action="" novalidate>

                    <label for="nome">Seu nome completo</label>

                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        required
                        placeholder="Ex: João da Silva"
                    >

                    <label for="email">Seu E-mail</label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="Ex: joao@email.com"
                    >

                    <button type="submit" class="botao">
                        Registrar meu compromisso sustentável
                    </button>

                    <p class="mensagem-retorno" id="mensagem-retorno"></p>

                </form>

            </div>

        </section>

    </main>

    <footer>

        <p>
            <strong>Equipe:</strong> Os Guardiões da Sustentabilidade
        </p>

        <p>
            &copy; Projeto integrador - Liga STEAM / ArcelorMittal - 2026
        </p>

         <a href="#" class="botao">
            Voltar ao início
        </a>

    </footer>

</body>
</html>
